---
vas:
  bgp_dt01:
    stages:
      - pre_stage_run:
          - name: Apply taint on worker-3
            type: cr
            definition:
              spec:
                taints:
                  - effect: NoSchedule
                    key: testOperator
                    value: 'true'
                  - effect: NoExecute
                    key: testOperator
                    value: 'true'
            kind: Node
            resource_name: worker-3
            state: patched
          - name: Disable rp_filters on OCP nodes
            type: cr
            definition:
              spec:
                profile:
                  - data: |
                      [main]
                      summary=Optimize systems running OpenShift (provider specific parent profile)
                      include=-provider-${f:exec:cat:/var/lib/ocp-tuned/provider},openshift

                      [sysctl]
                      net.ipv4.conf.enp8s0.rp_filter=0
                      net.ipv4.conf.enp9s0.rp_filter=0
                    name: openshift
                recommend:
                  - match:
                      - label: node-role.kubernetes.io/master
                      - label: node-role.kubernetes.io/infra
                    operand:
                      tunedConfig: {}
                    priority: 30
                    profile: openshift-control-plane
                  - operand:
                      tunedConfig: {}
                    priority: 40
                    profile: openshift-node
            api_version: tuned.openshift.io/v1
            kind: Tuned
            resource_name: default
            namespace: openshift-cluster-node-tuning-operator
            state: patched
        path: examples/dt/bgp/bgp_dt01/control-plane/nncp
        wait_conditions:
          - >-
            oc -n openstack wait nncp
            -l osp/nncm-config-type=standard
            --for jsonpath='{.status.conditions[0].reason}'=SuccessfullyConfigured
            --timeout=300s
        values:
          - name: network-values
            src_file: values.yaml
        build_output: nncp.yaml

      - path: examples/dt/bgp/bgp_dt01/control-plane
        wait_conditions:
          - >-
            oc -n openstack wait openstackcontrolplane
            controlplane
            --for condition=Ready
            --timeout=30m
        values:
          - name: network-values
            src_file: nncp/values.yaml
          - name: service-values
            src_file: service-values.yaml
        build_output: control-plane.yaml

      - path: examples/dt/bgp/bgp_dt01/edpm/networkers
        wait_conditions:
          - >-
            oc -n openstack wait openstackdataplanenodeset
            networker-nodes
            --for condition=SetupReady
            --timeout=600s
        values:
          - name: edpm-networker-nodeset-values
            src_file: values.yaml
        build_output: edpm-networker-nodeset.yaml

      - path: examples/dt/bgp/bgp_dt01/edpm/computes
        wait_conditions:
          - >-
            oc -n openstack wait openstackdataplanenodeset
            compute-nodes
            --for condition=SetupReady
            --timeout=600s
        values:
          - name: edpm-compute-nodeset-values
            src_file: values.yaml
        build_output: edpm-compute-nodeset.yaml

      - path: examples/dt/bgp/bgp_dt01/edpm/deployment
        wait_conditions:
          - >-
            oc -n openstack wait openstackdataplanedeployment
            edpm-deployment
            --for condition=Ready
            --timeout=90m
        values:
          - name: edpm-deployment-values
            src_file: values.yaml
        build_output: edpm-deployment.yaml
